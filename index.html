<style>

    border:0.5px solid var(--color-border-tertiary);

    cursor:pointer;

</head>

   ["After the popliteal fossa, the popliteal artery branches into which two vessels?",["The anterior tibial and posterior tibial arteries","The femoral and obturator arteries","The dorsalis pedis and saphenous arteries","The medial and lateral plantar arteries"]],
   ["Describe the path of the posterior tibial artery and what it becomes.",["It descends the deep posterior leg, passes behind the medial malleolus, and becomes the medial and lateral plantar arteries","It runs the anterior compartment and becomes the dorsalis pedis","It ascends to become the popliteal artery","It becomes the great saphenous vein"]],
   ["Describe the path of the anterior tibial artery and what it becomes.",["It enters the anterior compartment, descends, and becomes the dorsalis pedis on the dorsum of the foot","It runs behind the medial malleolus to the sole","It becomes the small saphenous vein","It becomes the posterior tibial artery"]],
   ["Where does the superficial venous return begin?",["At the dorsal venous arch of the foot","At the popliteal vein","At the femoral vein","At the inferior vena cava"]],
   ["Describe the path of the great (greater) saphenous vein.",["From the dorsal venous arch, up the MEDIAL leg and thigh (anterior to the medial malleolus), draining into the femoral vein","Up the posterior leg into the popliteal vein","Down the lateral leg into the fibular vein","Through the adductor hiatus into the popliteal vein"]],
   ["Describe the path of the small (lesser) saphenous vein.",["From the dorsal venous arch, up the POSTERIOR leg (behind the lateral malleolus), draining into the popliteal vein","Up the medial thigh into the femoral vein","Anterior to the medial malleolus into the femoral vein","Into the dorsalis pedis artery"]],
   ["How are deep veins named, and are superficial veins named the same way?",["Deep veins are named after the artery they accompany; superficial veins are NOT (they have their own names)","Deep and superficial veins are both named after arteries","Superficial veins are named after arteries; deep veins are not","Neither is named after arteries"]],
   ["What is the Latin term for the paired veins that accompany a named artery?",["Venae comitantes","Vasa vasorum","Vena cava","Arteriae rectae"]],
   ["In the 'Tom, Dick, and nervous Harry' mnemonic behind the medial malleolus, the structures (front to back) are:",["Tibialis posterior, flexor Digitorum longus, posterior tibial Artery & Vein, tibial Nerve, flexor Hallucis longus","Tibialis anterior, EDL, anterior tibial artery, deep fibular nerve, EHL","Tibialis posterior, fibularis longus, popliteal artery, sciatic nerve, soleus","Gastrocnemius, soleus, popliteal vessels, tibial nerve, plantaris"]],
   ["The borders of the femoral triangle are:",["The inguinal ligament (superior), sartorius (lateral), and adductor longus (medial)","Biceps femoris, semitendinosus, and gastrocnemius","Sartorius, gracilis, and the inguinal ligament","The adductor magnus, pectineus, and iliopsoas"]],
   ["The contents of the femoral triangle, lateral to medial, are:",["Femoral nerve, artery, vein, and lymphatics","Femoral vein, artery, nerve, then sciatic nerve","Great saphenous vein, femoral artery, obturator nerve","Tibial nerve, popliteal artery and vein"]],
   ["The floor of the femoral triangle is formed by which muscles?",["Iliopsoas and pectineus","Sartorius and gracilis","Adductor longus and magnus","Gastrocnemius and soleus"]],
   ["The borders of the popliteal fossa are formed by:",["Biceps femoris (superolateral), semitendinosus/semimembranosus (superomedial), and the two heads of gastrocnemius (inferior)","The inguinal ligament, sartorius, and adductor longus","The quadriceps, patella, and tibial tuberosity","The soleus, plantaris, and Achilles tendon"]],
   ["The contents of the popliteal fossa include:",["The popliteal artery and vein, the tibial nerve, and the common fibular nerve","The femoral nerve, artery, vein, and lymphatics","The obturator nerve and great saphenous vein","The sciatic nerve and adductor vessels"]]
  ]}
  };
  var ORDER=["A","B","C","D","E","F"];

  // Master section: pool every question from A-F.
  (function(){
    var all=[];
    ORDER.forEach(function(L){ DATA[L].qs.forEach(function(qq){ all.push(qq); }); });
    DATA.M={title:"Master — all worksheets",master:true,qs:all};
  })();
  var HUB_ORDER=["A","B","C","D","E","F","M"];

  // Persistent scores
  var STORE_KEY="anatomyDrillScores_v1";
  var scores={};
  try{ var raw=localStorage.getItem(STORE_KEY); if(raw) scores=JSON.parse(raw)||{}; }catch(e){ scores={}; }
  function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(scores)); }catch(e){} }

  function sh(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
  var hub=document.getElementById('hub'),quiz=document.getElementById('quiz'),
      q=document.getElementById('q'),opts=document.getElementById('opts'),fb=document.getElementById('fb'),
      nx=document.getElementById('next'),prog=document.getElementById('prog'),sc=document.getElementById('sc'),
      card=document.getElementById('card'),done=document.getElementById('done'),qhead=document.getElementById('qhead'),
      toHub=document.getElementById('toHub'),restartTop=document.getElementById('restartTop');

  function badge(L){
    var s=scores[L];
    if(!s) return '<span style="font-size:13px;color:var(--color-text-tertiary);">Not started</span>';
    var col=s.pct===100?'var(--color-text-success)':(s.pct>=80?'var(--color-text-primary)':'var(--color-text-danger)');
    return '<span style="font-size:13px;font-weight:500;color:'+col+';">'+s.right+'/'+s.total+' &middot; '+s.pct+'%</span>';
  }
  function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function renderHub(){
    quiz.style.display='none';hub.style.display='block';
    var done_n=Object.keys(scores).length;
    var html='<div style="margin-bottom:4px;"><div style="font-size:22px;font-weight:600;">Lower extremity drill</div>'+
      '<div style="font-size:13px;color:var(--color-text-secondary);margin-top:2px;">Six worksheets + a master gauntlet &middot; pick a section, drill to 100%</div></div>'+
      '<div style="display:flex;flex-direction:column;gap:8px;margin:16px 0;">';
    HUB_ORDER.forEach(function(L){
      var d=DATA[L],isM=!!d.master;
      html+='<div style="display:flex;align-items:center;gap:12px;background:var(--color-background-primary);border:0.5px solid '+(isM?'var(--color-border-success)':'var(--color-border-tertiary)')+';border-radius:var(--border-radius-lg);padding:12px 14px;">'+
        '<div style="width:30px;height:30px;flex:none;border-radius:8px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;">'+L+'</div>'+
        '<div style="flex:1;min-width:0;">'+
          '<div style="font-size:15px;font-weight:500;">'+esc(d.title)+'</div>'+
          '<div style="font-size:12px;color:var(--color-text-secondary);">'+d.qs.length+' questions'+(d.note?' &middot; partial':'')+(isM?' &middot; everything, shuffled':'')+'</div>'+
        '</div>'+
        '<div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;">'+
          badge(L)+
          '<div style="display:flex;gap:6px;">'+
            '<button data-start="'+L+'" style="padding:3px 12px;font-size:13px;min-height:0;">'+(scores[L]?'Retake':'Start')+'</button>'+
            (scores[L]?'<button data-reset="'+L+'" style="padding:3px 10px;font-size:12px;min-height:0;color:var(--color-text-secondary);">Reset</button>':'')+
          '</div>'+
        '</div>'+
      '</div>';
    });
    html+='</div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;border-top:0.5px solid var(--color-border-tertiary);padding-top:12px;">'+
      '<span style="font-size:13px;color:var(--color-text-secondary);">'+done_n+' sections scored</span>'+
      '<button id="resetAll" style="padding:3px 12px;font-size:13px;min-height:0;">Reset all scores</button></div>';
    hub.innerHTML=html;
    Array.prototype.forEach.call(hub.querySelectorAll('[data-start]'),function(b){b.onclick=function(){startSection(b.getAttribute('data-start'));};});
    Array.prototype.forEach.call(hub.querySelectorAll('[data-reset]'),function(b){b.onclick=function(){delete scores[b.getAttribute('data-reset')];save();renderHub();};});
    document.getElementById('resetAll').onclick=function(){scores={};save();renderHub();};
  }

  var cur=null,order=[],i=0,right=0,ans=0,missed=[];
  function startSection(L){
    cur=L;var d=DATA[L];
    order=sh(d.qs.map(function(_,k){return k;}));
    i=0;right=0;ans=0;missed=[];
    hub.style.display='none';quiz.style.display='block';
    done.style.display='none';card.style.display='block';
    qhead.innerHTML=(d.master?'Master gauntlet':'Worksheet '+L)+' &mdash; '+esc(d.title)+(d.note?'<div style="font-size:12px;color:var(--color-text-tertiary);font-weight:400;margin-top:3px;">'+esc(d.note)+'</div>':'');
    render();
  }
  function render(){
    var d=DATA[cur],it=d.qs[order[i]],ok=it[1][0];
    prog.textContent=(i+1)+' / '+d.qs.length;sc.textContent=right+' correct';q.textContent=it[0];
    fb.style.display='none';nx.style.display='none';opts.innerHTML='';
    sh(it[1].slice()).forEach(function(t){
      var b=document.createElement('button');b.textContent=t;
      b.style.cssText='text-align:left;justify-content:flex-start;padding:10px 14px;font-size:15px;line-height:1.4;width:100%;';
      b.onclick=function(){pick(b,t===ok,ok,it[0]);};opts.appendChild(b);
    });
  }
  function pick(b,good,ok,qtext){
    ans++;for(var k=0;k<opts.children.length;k++)opts.children[k].disabled=true;
    if(good){right++;b.style.borderColor='var(--color-border-success)';b.style.background='var(--color-background-success)';b.style.color='var(--color-text-success)';fb.textContent='Correct.';fb.style.color='var(--color-text-success)';}
    else{missed.push(qtext);b.style.borderColor='var(--color-border-danger)';b.style.background='var(--color-background-danger)';b.style.color='var(--color-text-danger)';
      for(var k=0;k<opts.children.length;k++){if(opts.children[k].textContent===ok){opts.children[k].style.borderColor='var(--color-border-success)';opts.children[k].style.background='var(--color-background-success)';opts.children[k].style.color='var(--color-text-success)';}}
      fb.innerHTML='Incorrect. Answer: <b style="font-weight:600;">'+esc(ok)+'</b>';fb.style.color='var(--color-text-danger)';}
    fb.style.display='block';sc.textContent=right+' correct';
    nx.textContent=(i+1<DATA[cur].qs.length)?'Next':'See results';nx.style.display='inline-flex';
  }
  nx.onclick=function(){if(i+1<DATA[cur].qs.length){i++;render();}else finish();};
  restartTop.onclick=function(){startSection(cur);};
  toHub.onclick=function(){renderHub();};
  function finish(){
    var d=DATA[cur],total=d.qs.length,pct=Math.round(right/total*100),perfect=right===total;
    scores[cur]={right:right,total:total,pct:pct};save();
    card.style.display='none';nx.style.display='none';
    done.style.display='block';
    done.innerHTML='<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:6px;">'+(d.master?'Master gauntlet':'Worksheet '+cur)+' &mdash; '+esc(d.title)+'</div>'+
      '<div style="font-size:44px;font-weight:600;color:'+(perfect?'var(--color-text-success)':'var(--color-text-primary)')+';">'+pct+'%</div>'+
      '<div style="font-size:15px;color:var(--color-text-secondary);margin:4px 0 22px;">'+right+' of '+total+' correct</div>'+
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">'+
      '<button id="backHub">Back to hub</button>'+
      '<button id="again">Restart section</button></div>';
    document.getElementById('backHub').onclick=function(){renderHub();};
    document.getElementById('again').onclick=function(){startSection(cur);};
  }

  renderHub();
})();
</script>
</body>
</html>
