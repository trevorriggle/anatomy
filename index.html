<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Worksheet picker</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1d1d1b; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 20px 40px; }
  .lede { font-size: 15px; color: #b8b8b2; margin: 0 0 20px; }
  .list { display: flex; flex-direction: column; gap: 16px; }
  .card { display: flex; align-items: center; gap: 18px; background: #2e2e2c; border-radius: 18px; padding: 22px 24px; }
  .badge { flex: 0 0 auto; width: 44px; height: 44px; border-radius: 11px; background: #1d1d1b; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 500; font-size: 17px; }
  .body { flex: 1 1 auto; min-width: 0; }
  .title { margin: 0; color: #fff; font-weight: 500; font-size: 18px; }
  .sub { margin: 4px 0 0; color: #9a9a93; font-size: 15px; }
  .right { flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .status { color: #9a9a93; font-size: 15px; }
  .start { background: transparent; border: 0.5px solid rgba(255,255,255,0.35); color: #fff; border-radius: 8px; padding: 7px 22px; font-size: 15px; cursor: pointer; }
  .footer { display: flex; align-items: flex-end; justify-content: space-between; margin-top: 24px; padding-top: 20px; }
  .scored { font-size: 15px; color: #b8b8b2; line-height: 1.4; }
  .reset { background: transparent; border: 0.5px solid #e2e2dc; color: #cfcfc8; border-radius: 8px; padding: 8px 18px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <p class="lede">Six worksheets · pick a section, drill to 100%</p>
  <div class="list" id="list"></div>
  <div class="footer">
    <span class="scored">0 of 6 sections<br>scored</span>
    <button class="reset">Reset all scores</button>
  </div>
</div>
<script>
const sections = [
  ["A", "Bones of Lower Extremity", "34 questions"],
  ["B", "Muscles of Gluteus & Thigh", "34 questions"],
  ["C", "Muscles of Leg", "15 questions · partial"],
  ["D", "Study of Lower Limb Joints", "15 questions"],
  ["E", "Lumbosacral Plexus of Nerves", "19 questions"],
  ["F", "Blood Vessels of Lower Limb", "19 questions"],
];
document.getElementById("list").innerHTML = sections.map(([letter, title, sub]) => `
  <div class="card">
    <div class="badge">${letter}</div>
    <div class="body">
      <p class="title">${title}</p>
      <p class="sub">${sub}</p>
    </div>
    <div class="right">
      <span class="status">Not started</span>
      <button class="start">Start</button>
    </div>
  </div>
`).join("");
</script>
</body>
</html>
